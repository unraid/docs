name: Fork Preview Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - docs/**
      - i18n/**
      - src/**
      - static/**
      - scripts/**
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - babel.config.js
      - docusaurus.config.ts
      - sidebars.js
      - sidebar-semver-sort.js
      - .github/workflows/fork-preview-build.yml
      - .github/workflows/fork-preview-deploy.yml

permissions:
  contents: read

concurrency:
  group: fork-preview-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build site
        run: pnpm build

      - name: Write preview metadata
        run: |
          set -euo pipefail
          mkdir -p .preview-artifact
          cat > .preview-artifact/metadata.json <<'EOF'
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "head_sha": "${{ github.event.pull_request.head.sha }}",
            "head_ref": "${{ github.event.pull_request.head.ref }}",
            "head_repo": "${{ github.event.pull_request.head.repo.full_name }}",
            "base_repo": "${{ github.repository }}"
          }
          EOF

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-site
          path: |
            build
            .preview-artifact/metadata.json
          if-no-files-found: error
          retention-days: 7
